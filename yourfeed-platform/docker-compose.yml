services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yourfeed
      POSTGRES_PASSWORD: yourfeed
      POSTGRES_DB: yourfeed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yourfeed"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://yourfeed:yourfeed@postgres:5432/yourfeed
      ENVIRONMENT: development
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./examples:/examples

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
